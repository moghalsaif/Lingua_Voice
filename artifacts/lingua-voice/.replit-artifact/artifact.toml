kind = "web"
previewPath = "/"
title = "Lingua Voice"
version = "1.0.0"
id = "artifacts/lingua-voice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20355

[services.development]
run = "pnpm --filter @workspace/lingua-voice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lingua-voice", "run", "build" ]
publicDir = "artifacts/lingua-voice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20355"
BASE_PATH = "/"
